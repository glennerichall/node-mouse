<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Remote Mouse</title>
  <meta name="theme-color" content="#101417" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Remote Mouse" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="./styles.css?v=20260330b" />
</head>
<body>
  <main id="app">
    <section id="workspace" aria-label="Remote workspace">
      <aside id="left-menu" aria-label="Actions serveur">
        <div class="admin-group admin-group-updates" aria-label="Mises a jour">
          <button id="btn-force-update-check" type="button" title="Forcer la vérification de mise à jour" aria-label="Forcer la vérification de mise à jour">Vérifier MAJ</button>
          <button id="btn-install-update" type="button" title="Installer la mise à jour" aria-label="Installer la mise à jour">Installer MAJ</button>
          <button id="btn-restart-service" type="button" title="Redémarrer le service" aria-label="Redémarrer le service">Redémarrer service</button>
        </div>
        <hr class="admin-separator" aria-hidden="true" />
        <div class="admin-group admin-group-display" aria-label="Affichage et informations">
          <div class="admin-split-row">
            <button id="btn-open-qr-browser-server" type="button" title="Ouvrir la page QR sur le serveur" aria-label="Ouvrir la page QR sur le serveur">QR serveur</button>
            <button id="btn-open-qr-browser-client" type="button" title="Ouvrir la page QR sur le client" aria-label="Ouvrir la page QR sur le client">QR client</button>
          </div>
          <div class="admin-split-row">
            <button id="btn-open-server-info-browser-server" type="button" title="Ouvrir la page server info sur le serveur" aria-label="Ouvrir la page server info sur le serveur">Info serveur</button>
            <button id="btn-open-server-info-browser-client" type="button" title="Ouvrir la page server info sur le client" aria-label="Ouvrir la page server info sur le client">Info client</button>
          </div>
          <button id="btn-open-config-page" type="button" title="Ouvrir la page de configuration" aria-label="Ouvrir la page de configuration">Configuration</button>
        </div>
        <hr class="admin-separator" aria-hidden="true" />
        <div class="admin-group admin-group-access" aria-label="Acces">
          <button id="btn-toggle-qr-overlay" type="button" title="Masquer/Afficher l'overlay QR" aria-label="Masquer/Afficher l'overlay QR">Toggle QR overlay</button>
          <button id="btn-rotate-entry-token" type="button" title="Forcer la rotation du token d'entrée" aria-label="Forcer la rotation du token d'entrée">Changer le jeton d'entrée</button>
        </div>
        <p id="admin-app-version" aria-label="Version du programme">Version: --</p>
      </aside>

      <section id="touch-area">
        <div id="admin-drawer-scrim" aria-hidden="true"></div>
        <nav id="browser-shortcuts" aria-label="Raccourcis navigateur">
          <button id="btn-open-brave" type="button" aria-label="Ouvrir ou focus Brave" title="Brave">
            <img src="./brave-icon.svg" alt="" aria-hidden="true" />
          </button>
          <button id="btn-browser-back" type="button" aria-label="Page précédente" title="Alt+Left">⟵</button>
          <button id="btn-browser-forward" type="button" aria-label="Page suivante" title="Alt+Right">⟶</button>
          <button id="btn-prev-tab" type="button" aria-label="Onglet précédent" title="Ctrl+Shift+Tab">◀</button>
          <button id="btn-next-tab" type="button" aria-label="Onglet suivant" title="Ctrl+Tab">▶</button>
          <button id="btn-new-tab" type="button" aria-label="Nouvel onglet" title="Ctrl+T">＋</button>
          <button id="btn-close-tab" type="button" aria-label="Fermer onglet" title="Ctrl+W">✕</button>
          <button id="btn-address-bar" type="button" aria-label="Barre d'adresse" title="Ctrl+L">⌕</button>
          <button id="btn-hard-reload" type="button" aria-label="Recharger" title="Ctrl+F5">↻</button>
          <button id="btn-fullscreen" type="button" aria-label="Plein écran" title="F11">⛶</button>
        </nav>
        <section id="tv-controls" aria-label="Controle TV Samsung">
          <p class="section-label">Samsung TV</p>
          <div class="tv-actions">
            <button id="btn-samsung-on" type="button" aria-label="Allumer la television Samsung">On</button>
            <button id="btn-samsung-off" type="button" aria-label="Eteindre la television Samsung">Off</button>
            <button id="btn-samsung-volup" type="button" aria-label="Augmenter le volume Samsung">Vol+</button>
            <button id="btn-samsung-voldown" type="button" aria-label="Diminuer le volume Samsung">Vol-</button>
            <button id="btn-samsung-input" type="button" aria-label="Changer la source Samsung">Source</button>
            <button id="btn-samsung-enter" type="button" aria-label="Valider le menu Samsung">Enter</button>
            <button id="btn-samsung-pc-input" type="button" aria-label="Basculer vers l entree PC Samsung">PC</button>
          </div>
        </section>
        <canvas id="touchpad"></canvas>
        <section id="cursor-preview" aria-label="Aperçu sous curseur">
          <canvas id="preview-canvas" width="128" height="84"></canvas>
        </section>
      </section>
    </section>

    <section id="keyboard-panel" class="hidden" aria-label="Clavier">
      <textarea id="text-input" placeholder="Saisir du texte à envoyer"></textarea>
      <button id="send-text" type="button">Envoyer</button>
    </section>

    <nav id="menu" aria-label="Actions">
      <button id="btn-keyboard" type="button">Clavier</button>
      <button id="btn-left" type="button">Clic G</button>
      <button id="btn-right" type="button">Clic D</button>
      <button id="btn-enter" type="button">Entrée</button>
      <button id="btn-backspace" type="button">⌫</button>
    </nav>

    <section id="connection-overlay" aria-live="polite">
      <div class="connection-card">
        <h2 data-connection-title>Serveur inaccessible</h2>
        <p data-connection-message>En attente de connexion...</p>
      </div>
    </section>

    <section id="client-notifications" aria-live="polite" aria-label="Notifications"></section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="./client/main.js?v=20260330b"></script>
</body>
</html>
